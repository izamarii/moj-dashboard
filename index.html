// ── IndexedDB ──
const DB='db1';
function openDB(){return new Promise((res,rej)=>{const r=indexedDB.open(DB,1);r.onupgradeneeded=e=>{if(!e.target.result.objectStoreNames.contains('s'))e.target.result.createObjectStore('s')};r.onsuccess=e=>res(e.target.result);r.onerror=e=>rej(e)});}
async function dbGet(k){const db=await openDB();return new Promise((res,rej)=>{const r=db.transaction('s','readonly').objectStore('s').get(k);r.onsuccess=e=>res(e.target.result);r.onerror=rej})}
async function dbSet(k,v){const db=await openDB();return new Promise((res,rej)=>{const tx=db.transaction('s','readwrite');tx.objectStore('s').put(v,k);tx.oncomplete=res;tx.onerror=rej})}

// ── Helpers ──
const toISO=d=>d.toISOString().split('T')[0];
const today=()=>toISO(new Date());
const monOff=d=>(d+6)%7;
const daysInM=(y,m)=>new Date(y,m+1,0).getDate();
const weekMon=s=>{const d=new Date(s+'T12:00');d.setDate(d.getDate()-monOff(d.getDay()));return toISO(d)};
const wkNum=s=>{const d=new Date(s);d.setHours(12);const day=d.getDay()||7;d.setDate(d.getDate()+4-day);const y=new Date(d.getFullYear(),0,1);return Math.ceil((((d-y)/864e5)+1)/7)};

// ── Theme ──
let _dark=localStorage.getItem('theme')==='dark';
document.body.className=_dark?'dark':'light';
function toggleTheme(){_dark=!_dark;document.body.className=_dark?'dark':'light';localStorage.setItem('theme',_dark?'dark':'light');render()}

// ── Colors ──
function C(){return _dark?{bg:'#1a1612',card:'#231f1a',al:'#2a2318',lv:'#2a2320',tx:'#e8e0d0',mu:'#7a6a50',bd:'#3a3020',gd:'#c9a84c',sm:'#1e1a15',ib:'#2a2520',sl:'#3a3020'}:{bg:'#f5f0e8',card:'#faf7f2',al:'#f0e8d8',lv:'#ede8e3',tx:'#2e2416',mu:'#9a8a72',bd:'#e0d4bc',gd:'#c9a84c',sm:'#f8f4ee',ib:'#f0ece4',sl:'#e0d4bc'}}

// ── Storage hook ──
const _store={};
async function load(k,def){if(_store[k]===undefined){try{const v=await dbGet(k);_store[k]=v!==undefined?v:def}catch{try{const s=localStorage.getItem(k);_store[k]=s?JSON.parse(s):def}catch{_store[k]=def}}}return _store[k]}
function save(k,v){_store[k]=v;dbSet(k,v).catch(()=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}});render()}

    me:`<svg width="${sz}" height="${sz}" viewBox="0 0 16 16" fill="none"><circle cx="8" cy="5" r="2.5" stroke="${col}" stroke-width="1.4"/><path d="M3 14c0-2.8 2.2-5 5-5s5 2.2 5 5" stroke="${col}" stroke-width="1.4" stroke-linecap="round"/><path d="M11.2 3.2c.5.4.8 1 .8 1.8" stroke="${col}" stroke-width="1.2" stroke-linecap="round"/></svg>`,
    dots:`<svg width="${sz}" height="${sz}" viewBox="0 0 16 16" fill="none"><circle cx="4.5" cy="8" r="1.3" fill="${col}"/><circle cx="8" cy="8" r="1.3" fill="${col}"/><circle cx="11.5" cy="8" r="1.3" fill="${col}"/></svg>`,

function icn(name,sz,col,fill){const d=document.createElement('span');d.style.cssText='display:flex;align-items:center;flex-shrink:0';d.innerHTML=icon(name,sz,col,fill);return d}

function dailyQuote(){const n=new Date(),s=new Date(n.getFullYear(),0,0);return QUOTES[Math.floor((n-s)/864e5)%QUOTES.length]}

// ── State ──
const S={tab:'cal',data:{},modals:{},forms:{},loaded:false};

async function init(){
  await Promise.all(KEYS.map(async k=>{S.data[k]=await load(k,DEF[k])}));
  S.data.moodSettings=await load('moodSettings',DEFAULT_MOODS);
  S.loaded=true;render()
}

function setData(k,v){S.data[k]=v;save(k,v)}
function setTab(t){S.tab=t;render()}
function openModal(k,v){S.modals[k]=v||true;render()}
function closeModal(k){delete S.modals[k];render()}

// ── Habit helpers ──
function habWeekCount(h,ws){
  const days=Array.from({length:7},(_,i)=>{const d=new Date(ws+'T12:00');d.setDate(d.getDate()+i);return toISO(d)});
  return days.filter(d=>h.checks&&h.checks[d]).length
}
function habDueToday(h,date){const ws=weekMon(date);return habWeekCount(h,ws)<(h.wt||7)}
function habDone(h,d){return!!(h.checks&&h.checks[d])}

// ── Task helpers ──
function taskDue(t,date){
  if(!t.rep||t.rep==='once')return t.date===date;
  const dow=new Date(date+'T12:00').getDay();
  if(t.rep==='daily')return!t.date||date>=t.date;
  if(t.rep==='weekly'){if(t.date&&date<t.date)return false;const s=new Date((t.date||date)+'T12:00');return Math.floor((new Date(date+'T12:00')-s)/864e5)%7===0}
  if(t.rep==='custom'&&t.days){if(t.date&&date<t.date)return false;return t.days.includes(dow)}
  return false
}
function taskDone(t,date){return t.rep&&t.rep!=='once'?!!(t.dm&&t.dm[date]):t.done}

// ── DOM helpers ──
function el(tag,css,html){const e=document.createElement(tag);if(css)e.style.cssText=css;if(html!==undefined)e.innerHTML=html;return e}
function btn(label,onClick,css){const b=el('button',css||'');if(typeof label==='string')b.textContent=label;else b.appendChild(label);b.onclick=onClick;return b}
function inp(type,val,onChange,css,placeholder){const i=el('input',css||'');i.type=type;i.value=val||'';i.placeholder=placeholder||'';i.oninput=e=>onChange(e.target.value);return i}
function div(css,children){const d=el('div',css);(children||[]).forEach(c=>c&&d.appendChild(typeof c==='string'?Object.assign(document.createTextNode(c)):c));return d}

function bar(pct,color,c,h){
  const w=el('div',`background:${c.bd};border-radius:999px;height:${h||5}px;overflow:hidden;flex:1`);
  const f=el('div',`width:${Math.min(100,pct||0)}%;background:${color};height:100%;border-radius:999px;transition:width .4s`);
  w.appendChild(f);return w
}

function checkbox(done,onToggle,c){
  const b=el('div',`width:22px;height:22px;border-radius:6px;border:1.5px solid ${done?'#c9a84c':c.bd};background:${done?'#c9a84c':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s`);
  if(done)b.innerHTML=icon('check',11,'#1a1208');
  b.onclick=e=>{e.stopPropagation();onToggle()};
  return b
}

function sectionCard(title,rows,c){
  const w=el('div','margin-bottom:12px');
  const lbl=el('div',`font-size:9px;font-weight:700;color:${c.gd};text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;padding-left:2px`);
  lbl.textContent=title;
  const card=el('div',`background:${c.card};border-radius:14px;border:1px solid ${c.bd};overflow:hidden`);
  rows.forEach(r=>card.appendChild(r));
  w.appendChild(lbl);w.appendChild(card);return w
}

function modal(title,content,onClose,c){
  const overlay=el('div','position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:flex-end;justify-content:center');
  overlay.onclick=onClose;
  const box=el('div',`background:${c.card};border-radius:24px 24px 0 0;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;padding:24px 20px 32px;border:1px solid ${c.bd}`);
  box.onclick=e=>e.stopPropagation();
  const hdr=el('div','display:flex;justify-content:space-between;align-items:center;margin-bottom:16px');
  const ttl=el('div',`font-weight:700;font-size:16px;color:${c.gd}`);ttl.textContent=title;
  const cls=btn('✕',onClose,`background:${c.bd};border:none;border-radius:10px;width:30px;height:30px;cursor:pointer;font-size:15px;color:${c.mu}`);
  hdr.appendChild(ttl);hdr.appendChild(cls);
  box.appendChild(hdr);box.appendChild(content);
  overlay.appendChild(box);return overlay
}

// ── Smoke Header ──
function renderHeader(){
  const c=C();const q=dailyQuote();
  const now=new Date();
  const dateStr=now.toLocaleDateString('sk-SK',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const nameKey=`${now.getMonth()+1}-${now.getDate()}`;
  const hbg=_dark?'linear-gradient(160deg,#1e1a14,#17140f)':'linear-gradient(160deg,#f0e8d8,#e8dcc8 40%,#f0ead8)';
  const h=el('div',`position:relative;overflow:hidden;padding:clamp(20px,5vw,36px) clamp(16px,5vw,24px) clamp(40px,8vw,56px);text-align:center;background:${hbg}`);
  h.innerHTML=`<svg style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none" viewBox="0 0 480 160" preserveAspectRatio="xMidYMid slice"><defs><filter id="b1"><feGaussianBlur stdDeviation="12"/></filter><filter id="b2"><feGaussianBlur stdDeviation="18"/></filter></defs>${_dark?`<ellipse cx="80" cy="90" rx="120" ry="55" fill="#2a2010" opacity="0.6" filter="url(#b2)"/><ellipse cx="400" cy="70" rx="130" ry="50" fill="#201808" opacity="0.5" filter="url(#b2)"/>`:`<ellipse cx="80" cy="90" rx="120" ry="55" fill="#d4c4a8" opacity="0.35" filter="url(#b2)"/><ellipse cx="400" cy="70" rx="130" ry="50" fill="#c8b898" opacity="0.30" filter="url(#b2)"/><ellipse cx="60" cy="50" rx="80" ry="30" fill="#e8dcc8" opacity="0.55" filter="url(#b1)"/>`}<line x1="0" y1="158" x2="480" y2="158" stroke="#c9a84c" stroke-width="0.5" opacity="0.4"/></svg>`;
  const tog=el('div',`position:absolute;top:14px;right:14px;z-index:10;background:${_dark?'#2a2318':'#e8dcc8'};border:1px solid ${c.bd};border-radius:20px;width:36px;height:20px;cursor:pointer;display:flex;align-items:center;padding:2px`);
  const dot=el('div',`width:16px;height:16px;border-radius:50%;background:#c9a84c;transform:${_dark?'translateX(16px)':'translateX(0)'};transition:transform .3s`);
  tog.appendChild(dot);tog.onclick=toggleTheme;h.appendChild(tog);

  const now=new Date();
  if(!S.calView)S.calView={y:now.getFullYear(),m:now.getMonth()};

  const ttl=btn(SKM[m]+' '+y,()=>{openModal('monthlySummary',{y,m})},`background:transparent;border:none;cursor:pointer;font-weight:700;font-size:14px;color:${c.gd};letter-spacing:1px`);

  hdr.appendChild(prev);hdr.appendChild(ttl);hdr.appendChild(next);w.appendChild(hdr);
  // Day headers
  const dim2=new Date(y,m+1,0).getDate();
  const off=monOff(new Date(y,m,1).getDay());
  const dh=el('div','display:grid;grid-template-columns:18px repeat(7,1fr);gap:2px;margin-bottom:4px');
  dh.appendChild(el('div'));
  SKDS.forEach((d,i)=>{const x=el('div',`text-align:center;font-size:9px;font-weight:700;color:${i>=5?c.gd:c.mu};padding:2px 0`);x.textContent=d;dh.appendChild(x)});
  w.appendChild(dh);
  // Weeks
  let dn=1-off;
  while(dn<=dim2){
    const row=el('div','display:grid;grid-template-columns:18px repeat(7,1fr);gap:2px;margin-bottom:2px');
    const wkd=dn>=1?`${y}-${String(m+1).padStart(2,'0')}-${String(dn).padStart(2,'0')}`:null;

    const wl=el('div',`display:flex;align-items:center;justify-content:center;font-size:8px;color:${c.bd};font-weight:600`);wl.textContent=wn;row.appendChild(wl);
    for(let i=0;i<7;i++){
      const d=dn;
      if(d<1||d>dim2){row.appendChild(el('div'));dn++;continue}
      const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const tod=d===now.getDate()&&m===now.getMonth()&&y===now.getFullYear();
      const hol=SKH[`${m+1}-${d}`];
      const dt=tasks.filter(t=>taskDue(t,ds));
      const done=dt.filter(t=>taskDone(t,ds)).length;
      const pct=dt.length?Math.round((done/dt.length)*100):0;
      const moodId=moodLog[ds];const moodObj=moods.find(x=>x.id===moodId);
      const cell=el('div',`border-radius:8px;padding:3px 3px 4px;cursor:pointer;background:${hol?c.al:'transparent'};border:${tod?'2px solid #c9a84c':'2px solid transparent'};min-height:46px`);
      const num=el('div',`text-align:center;font-size:12px;font-weight:${tod?700:400};color:${tod?c.gd:hol?c.gd:c.tx};margin-bottom:2px`);num.textContent=d;cell.appendChild(num);
      if(moodObj){const dot=el('div',`width:6px;height:6px;border-radius:50%;background:#c9a84c;opacity:${moodObj.op};margin:0 auto 2px`);cell.appendChild(dot)}
      if(dt.length){
        const cnt=el('div',`font-size:8px;text-align:center;color:${c.mu};margin-bottom:2px;font-weight:600`);cnt.textContent=`${done}/${dt.length}`;cell.appendChild(cnt);
        const br=bar(pct,'#c9a84c',c,3);br.style.margin='0 2px';cell.appendChild(br)
      }
      cell.onclick=()=>{if(ds!==today())openModal('dayDetail',ds)};
      row.appendChild(cell);dn++
    }
    w.appendChild(row)

  // Today panel

  return w
